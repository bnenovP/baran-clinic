spring:
  datasource:
    url: jdbc:postgresql://db:5432/baran_clinic_db
    username: test
    password: test
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop   # creates schema for tests, drops after
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: always

  test:
    database:
      replace: none   # IMPORTANT: prevents replacing PostgreSQL with H2

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE